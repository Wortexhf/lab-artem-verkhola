<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>eShop</title>
</head>
<body>

    <header>
        <span class="logo">eShop</span>
        <button onclick="openModal()">create Product</button>
    </header>

    <div class="content">
        <p>Натисніть кнопку "create Product", щоб додати новий товар.</p>
    </div>

    <div id="myModal" class="modal-overlay" data-close="true">
        <div class="modal-content">
            <span class="close" data-close="true">&times;</span>
            <h2 class="modal-title">Create product</h2>

            <form id="productForm" name="productForm" class="productForm">

                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea>

                <label for="price">Price:</label>
                <input type="number" id="price" name="price" min="0" required>

                <label for="discountPercentage">Discount:</label>
                <input type="number" id="discountPercentage" name="discountPercentage" min="0" required>

                <label for="stock">In stock:</label>
                <input type="number" id="stock" name="stock" min="0">

                <label for="brand">Brand:</label>
                <input type="text" id="brand" name="brand">

                <label for="category">Category:</label>
                <select name="category" id="category" required>
                    <option value="smartphones">Smartphones</option>
                    <option value="laptops">Laptops</option>
                    <option value="fragrances">Fragrances</option>
                    <option value="skincare">Skincare</option>
                    <option value="groceries">Groceries</option>
                    <option value="home-decoration">Home decoration</option>
                </select>

                <label for="thumbnail">Link to picture:</label>
                <input type="url" id="thumbnail" name="thumbnail" required>

                <input type="submit" value="Save Product">
            </form>
        </div>
    </div>

    <script src="./js/modal.js"></script>
</body>
</html>
