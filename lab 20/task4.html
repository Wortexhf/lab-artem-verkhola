<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 - Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        body { background: #555; padding: 20px; }

        .open-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            width: 420px;
            min-width: 300px;
            position: relative;
            border-radius: 4px;
        }

        .close-btn {
            position: absolute;
            top: 8px; right: 8px;
            width: 24px; height: 24px;
            border: 1px solid #999;
            background: #eee;
            cursor: pointer;
            font-size: 16px;
            line-height: 22px;
            text-align: center;
            border-radius: 3px;
        }

        .close-btn:hover { background: #ccc; }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 4px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
        }

        .submit-btn {
            margin-top: 20px;
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
        }

        .submit-btn:hover { background: #43a047; }
    </style>
</head>
<body>

    <button class="open-btn" onclick="openModal()">Відкрити вікно реєстрації</button>

    <div id="modal" class="modal-overlay" data-close="true">
        <div class="modal-content">
            <span class="close-btn" data-close="true">&times;</span>

            <form id="regForm">
                <label>Нікнейм:</label>
                <input type="text" id="nickname" required>

                <label>Електронна адреса:</label>
                <input type="email" id="email" required>

                <label>Пароль:</label>
                <input type="password" id="password" required>

                <label>Підтвердження пароля:</label>
                <input type="password" id="confirmPassword" required>

                <button type="submit" class="submit-btn">Зареєструватися</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        modal.addEventListener('click', function(e) {
            if (e.target.dataset.close) closeModal();
        });

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const emailRegex = /^[A-Za-z0-9._%+\-]+@[A-Za-z0-9.\-]+\.[A-Za-z]{2,}$/;

            if (!emailRegex.test(email)) {
                alert('Будь ласка, введіть коректну електронну адресу.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Паролі не співпадають.');
                return;
            }

            console.log('Реєстрація успішна! Дані форми:', {
                nickname: document.getElementById('nickname').value,
                email: email
            });

            closeModal();
        });
    </script>
</body>
</html>
