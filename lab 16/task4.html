<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f2f2f2; padding: 20px; }
        .product-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            width: 220px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
        }
        .card-img-wrap {
            position: relative;
        }
        .card-img-wrap img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #e53935;
            color: #fff;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .category-tag {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .card-body {
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .card-title { font-weight: bold; font-size: 14px; }
        .card-desc { font-size: 12px; color: #666; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-top: 1px solid #eee;
        }
        .price { font-weight: bold; font-size: 15px; }
        .fa-shopping-cart { font-size: 20px; cursor: pointer; color: #333; }
        .fa-shopping-cart:hover { color: #e53935; }

        @media (max-width: 600px) { .card { width: 100%; } }
        @media (min-width: 601px) and (max-width: 900px) { .card { width: calc(50% - 16px); } }
    </style>
</head>
<body>
    <div class="product-cards" id="productCards"></div>

    <script src="index.js"></script>
    <script>
        function addToCart(id) {
            console.log(id);
        }

        const container = document.getElementById('productCards');

        products.forEach(function(p) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-wrap">
                    <img src="${p.thumbnail}" alt="${p.title}">
                    <span class="badge">${p.discountPercentage}%</span>
                    <span class="category-tag">${p.category}</span>
                </div>
                <div class="card-body">
                    <div class="card-title">${p.title}</div>
                    <div class="card-desc">${p.description}</div>
                </div>
                <div class="card-footer">
                    <span class="price">${p.price} $</span>
                    <div class="fa fa-shopping-cart" onclick="addToCart(${p.id})"></div>
                </div>
            `;
            container.appendChild(card);
        });
    </script>
</body>
</html>
