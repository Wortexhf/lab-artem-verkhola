<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/extra.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>eShop</title>
</head>
<body>

    <header>
        <span class="logo">eShop</span>
        <button onclick="openModal()">create Product</button>
    </header>

    <div class="filter-bar">
        <select id="filterCategory">
            <option value="">-- All categories --</option>
            <option value="smartphones">smartphones</option>
            <option value="laptops">laptops</option>
            <option value="fragrances">fragrances</option>
            <option value="skincare">skincare</option>
            <option value="groceries">groceries</option>
            <option value="home-decoration">home-decoration</option>
        </select>
        <input type="text" id="filterSearch" placeholder="-- search product --">
        <select id="filterSort">
            <option value="">-- sort products (Don't sort) --</option>
            <option value="price_asc">by increasing price</option>
            <option value="price_desc">by decreasing price</option>
            <option value="newest">newest first</option>
            <option value="oldest">oldest first</option>
        </select>
    </div>

    <div id="startWrap" class="start-wrap" style="display:none;">
        <button class="btn-start" onclick="fetchProducts()">Start</button>
    </div>

    <div class="cards-container" id="cardsContainer"></div>

    <div id="modal" class="modal-overlay" data-close="true">
        <div class="modal-content">
            <span class="close-btn" data-close="true">&times;</span>
            <h2 class="modal-title" id="modalTitle">Create product</h2>
            <form id="productForm" name="productForm" class="productForm">
                <label>Title:</label>
                <input type="text" id="title" name="title" required>
                <label>Description:</label>
                <textarea id="description" name="description" required></textarea>
                <label>Price:</label>
                <input type="number" id="price" name="price" min="0" required>
                <label>Discount:</label>
                <input type="number" id="discountPercentage" name="discountPercentage" min="0" required>
                <label>In stock:</label>
                <input type="number" id="stock" name="stock" min="0">
                <label>Brand:</label>
                <input type="text" id="brand" name="brand">
                <label>Category:</label>
                <select name="category" id="category" required>
                    <option value="smartphones">Smartphones</option>
                    <option value="laptops">Laptops</option>
                    <option value="fragrances">Fragrances</option>
                    <option value="skincare">Skincare</option>
                    <option value="groceries">Groceries</option>
                    <option value="home-decoration">Home decoration</option>
                </select>
                <label>Link to picture:</label>
                <input type="url" id="thumbnail" name="thumbnail" required>
                <input type="submit" value="Save Product">
            </form>
        </div>
    </div>

    <script>
        let products = [];
        let editingId = null;

        function productRender(list) {
            $('#cardsContainer').empty();

            if (list.length === 0) {
                $('#cardsContainer').append('<p class="no-results">Нічого не знайдено</p>');
                return;
            }

            $.each(list, function(i, product) {
                const card = $('<div>').addClass('card').attr('data-id', product.id);

                const imgWrap = $('<div>').addClass('card-img-wrap');
                imgWrap.append(
                    $('<img>').attr({ src: product.thumbnail, alt: product.title })
                        .on('error', function() { $(this).attr('src', 'https://via.placeholder.com/200x140'); })
                );
                imgWrap.append($('<span>').addClass('badge').text(Number(product.discountPercentage).toFixed(2) + '%'));
                imgWrap.append($('<span>').addClass('category-tag').text(product.category));

                const cardBody = $('<div>').addClass('card-body');
                cardBody.append($('<div>').addClass('card-title').text(product.title));
                cardBody.append($('<div>').addClass('card-desc').text(product.description));

                const cardFooter = $('<div>').addClass('card-footer');
                cardFooter.append($('<span>').addClass('price').text(product.price + ' $'));

                const actions = $('<div>').addClass('card-actions');
                actions.append(
                    $('<button>').addClass('btn-edit').text('✏️')
                        .on('click', function() { openEditModal(product.id); })
                );
                actions.append(
                    $('<button>').addClass('btn-delete').text('🗑️')
                        .on('click', function() { deleteProduct(product.id); })
                );
                cardFooter.append(actions);

                card.append(imgWrap, cardBody, cardFooter);
                $('#cardsContainer').append(card);
            });
        }

        function loadFromStorage() {
            const data = localStorage.getItem('products');
            if (data) {
                products = JSON.parse(data);
                $('#startWrap').hide();
                applyFilters();
            } else {
                $('#startWrap').show();
            }
        }

        function saveToStorage() {
            localStorage.setItem('products', JSON.stringify(products));
        }

        function generateId() {
            return 'id' + Date.now() + Math.floor(Math.random() * 1000);
        }

        function fetchProducts() {
            fetch('https://dummyjson.com/products?limit=100&skip=0')
                .then(r => r.json())
                .then(data => {
                    products = data.products.map(p => ({
                        id: 'id' + p.id,
                        title: p.title,
                        description: p.description,
                        price: p.price,
                        discountPercentage: p.discountPercentage,
                        stock: p.stock,
                        brand: p.brand || '',
                        category: p.category,
                        thumbnail: p.thumbnail,
                    }));
                    saveToStorage();
                    $('#startWrap').hide();
                    applyFilters();
                })
                .catch(() => alert('Помилка завантаження даних.'));
        }

        function openModal() {
            editingId = null;
            $('#modalTitle').text('Create product');
            document.forms.productForm.reset();
            $('#modal').css('display', 'flex');
        }

        function closeModal() {
            $('#modal').hide();
            editingId = null;
        }

        function openEditModal(id) {
            const p = products.find(p => p.id === id);
            if (!p) return;
            editingId = id;
            $('#modalTitle').text('Edit product');
            $('#title').val(p.title);
            $('#description').val(p.description);
            $('#price').val(p.price);
            $('#discountPercentage').val(p.discountPercentage);
            $('#stock').val(p.stock);
            $('#brand').val(p.brand);
            $('#category').val(p.category);
            $('#thumbnail').val(p.thumbnail);
            $('#modal').css('display', 'flex');
        }

        function filterByCategory(list, category) {
            return new Promise(resolve => {
                resolve(category ? list.filter(p => p.category === category) : list);
            });
        }

        function filterBySearch(list, query) {
            return new Promise(resolve => {
                if (!query) return resolve(list);
                const q = query.toLowerCase();
                resolve(list.filter(p =>
                    p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q)
                ));
            });
        }

        function sortProducts(list, sortBy) {
            return new Promise(resolve => {
                const s = [...list];
                if (sortBy === 'price_asc') s.sort((a, b) => a.price - b.price);
                else if (sortBy === 'price_desc') s.sort((a, b) => b.price - a.price);
                else if (sortBy === 'newest') s.sort((a, b) => b.id.localeCompare(a.id));
                else if (sortBy === 'oldest') s.sort((a, b) => a.id.localeCompare(b.id));
                resolve(s);
            });
        }

        function applyFilters() {
            const category = $('#filterCategory').val();
            const query = $('#filterSearch').val().trim();
            const sortBy = $('#filterSort').val();

            filterByCategory(products, category)
                .then(f => filterBySearch(f, query))
                .then(f => sortProducts(f, sortBy))
                .then(result => productRender(result));
        }

        function deleteProduct(id) {
            const p = products.find(p => p.id === id);
            if (!p) return;
            if (confirm(`Do you really want to remove "${p.title}"?`)) {
                products = products.filter(p => p.id !== id);
                saveToStorage();
                applyFilters();
            }
        }

        $(document).ready(function() {
            $('#productForm').on('submit', function(e) {
                e.preventDefault();
                const data = {
                    title: $('#title').val(),
                    description: $('#description').val(),
                    price: Number($('#price').val()),
                    discountPercentage: Number($('#discountPercentage').val()),
                    stock: Number($('#stock').val()),
                    brand: $('#brand').val(),
                    category: $('#category').val(),
                    thumbnail: $('#thumbnail').val(),
                };
                if (editingId) {
                    const idx = products.findIndex(p => p.id === editingId);
                    if (idx !== -1) products[idx] = { ...products[idx], ...data };
                } else {
                    products.push({ id: generateId(), ...data });
                }
                saveToStorage();
                document.forms.productForm.reset();
                closeModal();
                applyFilters();
            });

            $('#modal').on('click', function(e) {
                if ($(e.target).data('close')) closeModal();
            });

            $('#filterCategory, #filterSort').on('change', applyFilters);
            $('#filterSearch').on('input', applyFilters);

            loadFromStorage();
        });
    </script>
</body>
</html>
